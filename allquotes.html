<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Quotes — Miserable Offender</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="description" content="The full collection of quotes about the phrase 'Miserable Offender' and the Book of Common Prayer">
  <link rel="canonical" href="https://www.miserableoffender.com/allquotes.html">

  <meta property="og:title" content="All Quotes — Miserable Offender">
  <meta property="og:description" content="The full collection of quotes about the phrase 'Miserable Offender' and the Book of Common Prayer">
  <meta property="og:image" content="https://www.miserableoffender.com/images/og-image.png">
  <meta property="og:url" content="https://www.miserableoffender.com/allquotes.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Miserable Offender">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#0d0d0d">


  <link rel="stylesheet" href="css/miserable.css">
  <link rel="stylesheet" href="css/page.css">
</head>
<body class="page-body">

  <nav class="site-nav" aria-label="Site">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="./">Home</a>
      <a href="stickers.html">Stickers</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <main class="page-content">
    <h1 class="page-title">All Quotes</h1>
    <div id="quotes-list"><noscript>JavaScript must be enabled to view quotes.</noscript></div>
  </main>

  <script src="js/nav.js" defer></script>
  <script>
    fetch('quotes.json')
      .then(r => r.json())
      .then(quotes => {
        const list = document.getElementById('quotes-list');
        list.innerHTML = quotes.map(q => {
          const source = q.url
            ? `<span class="aq-source"><a href="${q.url}" target="_blank" rel="noopener noreferrer">${q.source}</a></span>`
            : `<span class="aq-source">${q.source}</span>`;
          const author = q.author
            ? `<span class="aq-author">${q.author}</span>`
            : '';
          return `
            <blockquote class="aq-entry"${q.url ? ` cite="${q.url}"` : ''}>
              <p class="aq-text">${q.text}</p>
              <footer class="aq-footer">${author}${source}</footer>
            </blockquote>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('quotes-list').textContent = 'Failed to load quotes.';
      });
  </script>

</body>
</html>
