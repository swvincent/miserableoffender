<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Quotes — Miserable Offender</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/miserable.css">
  <link rel="stylesheet" href="css/page.css">
</head>
<body class="page-body">

  <nav class="site-nav">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <main class="page-content">
    <h1 class="page-title">All Quotes</h1>
    <div id="quotes-list"></div>
  </main>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu   = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.site-nav')) {
        navMenu.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      }
    });

    fetch('quotes.json')
      .then(r => r.json())
      .then(quotes => {
        const list = document.getElementById('quotes-list');
        list.innerHTML = quotes.map(q => {
          const source = q.url
            ? `<span class="aq-source"><a href="${q.url}" target="_blank" rel="noopener noreferrer">${q.source}</a></span>`
            : `<span class="aq-source">${q.source}</span>`;
          const author = q.author
            ? `<span class="aq-author">${q.author}</span>`
            : '';
          return `
            <blockquote class="aq-entry">
              <p class="aq-text">${q.text}</p>
              <footer class="aq-footer">${author}${source}</footer>
            </blockquote>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('quotes-list').textContent = 'Failed to load quotes.';
      });
  </script>

</body>
</html>
