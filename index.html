<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miserable Offender</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="description" content="Quotes about the phrase 'Miserable Offender' and the Book of Common Prayer">
  <link rel="canonical" href="https://www.miserableoffender.com/">

  <meta property="og:title" content="Miserable Offender">
  <meta property="og:description" content="Quotes about the phrase 'Miserable Offender' and the Book of Common Prayer">
  <meta property="og:image" content="https://www.miserableoffender.com/images/og-image.png">
  <meta property="og:url" content="https://www.miserableoffender.com/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Miserable Offender">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/miserable.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <nav class="site-nav" aria-label="Site">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="allquotes.html">All Quotes</a>
      <a href="stickers.html">Stickers</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <main class="page-center">
    <h1 class="site-title"><span>Miserable</span> <span>Offender</span></h1>

    <blockquote class="quote-card" id="card">
    <span class="open-quote" aria-hidden="true">&ldquo;</span>
    <p id="quote-text"><noscript>JavaScript must be enabled to display quotes.</noscript></p>
    <p id="quote-author"></p>
    <p id="quote-source"></p>
    </blockquote>
  </main>

  <div class="quote-nav">
    <button class="prev-quote-btn" title="Previous quote (←)" aria-label="Previous quote">&#8249;</button>
    <button class="next-quote-btn" title="Next quote (Space / →)" aria-label="Next quote">&#8250;</button>
  </div>

  <script src="js/nav.js"></script>
  <script>
    let deck = [];
    let deckIndex = 0;

    // Fisher-Yates shuffle (in place)
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function getNextQuote() {
      if (deckIndex >= deck.length) deckIndex = 0;
      return deck[deckIndex++];
    }

    function getPrevQuote() {
      deckIndex -= 2;
      if (deckIndex < 0) deckIndex = deck.length + deckIndex;
      return deck[deckIndex++];
    }

    function displayQuote(quote) {
      document.getElementById('quote-text').textContent = quote.text;
      const authorEl = document.getElementById('quote-author');
      authorEl.textContent = quote.author ?? '';
      authorEl.classList.toggle('hidden', !quote.author);

      const sourceEl = document.getElementById('quote-source');
      if (quote.url) {
        sourceEl.innerHTML = `<a href="${quote.url}" target="_blank" rel="noopener noreferrer">${quote.source}</a>`;
        document.getElementById('card').setAttribute('cite', quote.url);
      } else {
        sourceEl.textContent = quote.source;
        document.getElementById('card').removeAttribute('cite');
      }
    }

    function initDeck(data) {
      deck = [...data];
      shuffle(deck);
      displayQuote(getNextQuote());
    }

    function setupKeyboardNav() {
      document.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'ArrowRight') {
          e.preventDefault();
          if (!document.querySelector('.next-quote-btn').disabled) nextQuote();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (!document.querySelector('.prev-quote-btn').disabled) prevQuote();
        }
      });
    }

    function setupSwipeNav() {
      let touchStartX, touchStartY;

      // Record where the finger first touched down
      document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const animating = document.querySelector('.next-quote-btn').disabled;

        if (Math.abs(dx) > 80 && Math.abs(dy) < Math.abs(dx) && !animating) {
          if (dx < 0) nextQuote(); else prevQuote();
        }
      }, { passive: true });
    }

    function changeQuote(getQuoteFn) {
      const textEl   = document.getElementById('quote-text');
      const authorEl = document.getElementById('quote-author');
      const sourceEl = document.getElementById('quote-source');
      const btns = document.querySelectorAll('.quote-nav button');

      btns.forEach(b => b.disabled = true);

      textEl.classList.add('fade-out');
      authorEl.classList.add('fade-out');
      sourceEl.classList.add('fade-out');

      textEl.addEventListener('animationend', () => {
        textEl.classList.remove('fade-out');
        authorEl.classList.remove('fade-out');
        sourceEl.classList.remove('fade-out');

        displayQuote(getQuoteFn());

        textEl.classList.add('fade-in');
        authorEl.classList.add('fade-in');
        sourceEl.classList.add('fade-in');

        textEl.addEventListener('animationend', () => {
          textEl.classList.remove('fade-in');
          authorEl.classList.remove('fade-in');
          sourceEl.classList.remove('fade-in');
          btns.forEach(b => b.disabled = false);
        }, { once: true });
      }, { once: true });
    }

    const nextQuote = () => changeQuote(getNextQuote);
    const prevQuote = () => changeQuote(getPrevQuote);

    // Load quotes from JSON, shuffle into a deck, then cycle through in order
    fetch('quotes.json')
      .then(r => r.json())
      .then(data => {
        initDeck(data);
        document.querySelector('.prev-quote-btn').addEventListener('click', prevQuote);
        document.querySelector('.next-quote-btn').addEventListener('click', nextQuote);
        setupKeyboardNav();
        setupSwipeNav();
      })
      .catch(() => {
        document.getElementById('quote-text').textContent = 'Failed to load quotes.';
      });
  </script>

</body>
</html>
