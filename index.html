<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miserable Offender</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/miserable.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <nav class="site-nav">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="allquotes.html">All Quotes</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="page-center">
    <h1 class="site-title">Miserable Offender</h1>

    <div class="quote-card" id="card">
    <span class="open-quote">&ldquo;</span>
    <p id="quote-text"></p>
    <p id="quote-author"></p>
    <p id="quote-source"></p>
    <button class="new-quote-btn" title="New quote (Space / →)">↻</button>
    </div>
  </div>

  <script>
    let deck = [];
    let deckIndex = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function getNextQuote() {
      if (deckIndex >= deck.length) deckIndex = 0;
      return deck[deckIndex++];
    }

    function displayQuote(quote) {
      document.getElementById('quote-text').textContent = quote.text;
      const authorEl = document.getElementById('quote-author');
      authorEl.textContent = quote.author ?? '';
      authorEl.classList.toggle('hidden', !quote.author);

      const sourceEl = document.getElementById('quote-source');
      if (quote.url) {
        sourceEl.innerHTML = `<a href="${quote.url}" target="_blank" rel="noopener noreferrer">${quote.source}</a>`;
      } else {
        sourceEl.textContent = quote.source;
      }
    }

    function nextQuote() {
      const textEl   = document.getElementById('quote-text');
      const authorEl = document.getElementById('quote-author');
      const sourceEl = document.getElementById('quote-source');
      const btn      = document.querySelector('.new-quote-btn');

      btn.disabled = true;

      textEl.classList.add('fade-out');
      authorEl.classList.add('fade-out');
      sourceEl.classList.add('fade-out');

      textEl.addEventListener('animationend', () => {
        textEl.classList.remove('fade-out');
        authorEl.classList.remove('fade-out');
        sourceEl.classList.remove('fade-out');

        displayQuote(getNextQuote());

        textEl.classList.add('fade-in');
        authorEl.classList.add('fade-in');
        sourceEl.classList.add('fade-in');

        textEl.addEventListener('animationend', () => {
          textEl.classList.remove('fade-in');
          authorEl.classList.remove('fade-in');
          sourceEl.classList.remove('fade-in');
          btn.disabled = false;
        }, { once: true });
      }, { once: true });
    }

    // Hamburger menu toggle
    const hamburger = document.getElementById('hamburger');
    const navMenu   = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.site-nav')) {
        navMenu.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      }
    });

    // Load quotes from JSON, shuffle into a deck, then cycle through in order
    fetch('quotes.json')
      .then(r => r.json())
      .then(data => {
        deck = [...data];
        shuffle(deck);
        displayQuote(getNextQuote());
        document.querySelector('.new-quote-btn').addEventListener('click', nextQuote);
        document.addEventListener('keydown', e => {
          if (e.key === ' ' || e.key === 'ArrowRight') {
            e.preventDefault();
            if (!document.querySelector('.new-quote-btn').disabled) nextQuote();
          }
        });
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
          touchStartX = e.changedTouches[0].clientX;
          touchStartY = e.changedTouches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          const dy = e.changedTouches[0].clientY - touchStartY;
          if (Math.hypot(dx, dy) > 100 && !document.querySelector('.new-quote-btn').disabled) nextQuote();
        }, { passive: true });
      })
      .catch(() => {
        document.getElementById('quote-text').textContent = 'Failed to load quotes.';
      });
  </script>

</body>
</html>
