<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Miserable Offender</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="miserable.css"/>
</head>
<body>

  <div class="quote-card" id="card">
    <span class="open-quote">&ldquo;</span>
    <p id="quote-text"></p>
    <p id="quote-author"></p>
    <p id="quote-source"></p>
    <button class="new-quote-btn" title="New quote">↻</button>
  </div>

  <script>
    let quotes = [];
    let lastIndex = -1;

    function getRandomQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex);
      lastIndex = idx;
      return quotes[idx];
    }

    function displayQuote(quote) {
      document.getElementById('quote-text').textContent = quote.text;
      const authorEl = document.getElementById('quote-author');
      if (quote.author) {
        authorEl.textContent = quote.author;
        authorEl.style.display = '';
      } else {
        authorEl.textContent = '';
        authorEl.style.display = 'none';
      }

      const sourceEl = document.getElementById('quote-source');
      if (quote.url) {
        sourceEl.innerHTML = `<a href="${quote.url}" target="_blank" rel="noopener noreferrer">${quote.source}</a>`;
      } else {
        sourceEl.textContent = quote.source;
      }
    }

    function nextQuote() {
      const textEl   = document.getElementById('quote-text');
      const authorEl = document.getElementById('quote-author');
      const sourceEl = document.getElementById('quote-source');

      textEl.classList.add('fade-out');
      authorEl.classList.add('fade-out');
      sourceEl.classList.add('fade-out');

      textEl.addEventListener('animationend', () => {
        textEl.classList.remove('fade-out');
        authorEl.classList.remove('fade-out');
        sourceEl.classList.remove('fade-out');

        displayQuote(getRandomQuote());

        textEl.classList.add('fade-in');
        authorEl.classList.add('fade-in');
        sourceEl.classList.add('fade-in');

        textEl.addEventListener('animationend', () => {
          textEl.classList.remove('fade-in');
          authorEl.classList.remove('fade-in');
          sourceEl.classList.remove('fade-in');
        }, { once: true });
      }, { once: true });
    }

    // Load quotes from JSON, then display a random one
    fetch('quotes.json')
      .then(r => r.json())
      .then(data => {
        quotes = data;
        displayQuote(getRandomQuote());
        document.querySelector('.new-quote-btn').addEventListener('click', nextQuote);
      });
  </script>

</body>
</html>
